<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Vulnerabilidades</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Gerenciador de Vulnerabilidades</h1>
    <nav>
      <button class="tab active" data-tab="vulnerabilidades">Vulnerabilidades</button>
      <button class="tab" data-tab="aplicacoes">Aplicações</button>
      <button class="tab" data-tab="ocorrencias">Ocorrências</button>
    </nav>
  </header>

  <main>
    <section id="vulnerabilidades" class="tab-content active">
      <div class="section-header">
        <h2>Vulnerabilidades</h2>
        <button class="btn btn-primary" onclick="abrirModal('vulnerabilidade')">Nova Vulnerabilidade</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Descrição</th>
            <th>Gravidade</th>
          </tr>
        </thead>
        <tbody id="tbody-vulnerabilidades"></tbody>
      </table>
    </section>

    <section id="aplicacoes" class="tab-content">
      <div class="section-header">
        <h2>Aplicações</h2>
        <button class="btn btn-primary" onclick="abrirModal('aplicacao')">Nova Aplicação</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Linguagem</th>
            <th>Repositório</th>
          </tr>
        </thead>
        <tbody id="tbody-aplicacoes"></tbody>
      </table>
    </section>

    <section id="ocorrencias" class="tab-content">
      <div class="section-header">
        <h2>Ocorrências</h2>
        <button class="btn btn-primary" onclick="abrirModal('ocorrencia')">Nova Ocorrência</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Aplicação</th>
            <th>Vulnerabilidade</th>
            <th>Data Descoberta</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbody-ocorrencias"></tbody>
      </table>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span class="modal-close" onclick="fecharModal()">&times;</span>
      <h3 id="modal-title"></h3>
      <form id="modal-form">
        <div id="modal-fields"></div>
        <button type="submit" class="btn btn-primary">Salvar</button>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
